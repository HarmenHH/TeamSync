<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="100" y1="200" x2="412" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.9" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)" />

  <!-- Subtle inner glow -->
  <rect x="20" y="20" width="472" height="472" rx="80" fill="white" fill-opacity="0.05" />

  <!-- Sync wave line connecting the dots -->
  <path
    d="M 130 200 C 200 200, 200 312, 256 312 C 312 312, 312 200, 382 200"
    stroke="url(#lineGrad)"
    stroke-width="28"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Team dots - top left -->
  <circle cx="150" cy="160" r="36" fill="white" fill-opacity="0.95" />
  <circle cx="150" cy="160" r="20" fill="#0ea5e9" fill-opacity="0.3" />

  <!-- Top right -->
  <circle cx="362" cy="160" r="36" fill="white" fill-opacity="0.95" />
  <circle cx="362" cy="160" r="20" fill="#0ea5e9" fill-opacity="0.3" />

  <!-- Bottom left -->
  <circle cx="150" cy="352" r="36" fill="white" fill-opacity="0.95" />
  <circle cx="150" cy="352" r="20" fill="#0ea5e9" fill-opacity="0.3" />

  <!-- Bottom right -->
  <circle cx="362" cy="352" r="36" fill="white" fill-opacity="0.95" />
  <circle cx="362" cy="352" r="20" fill="#0ea5e9" fill-opacity="0.3" />

  <!-- Center sync symbol -->
  <path
    d="M 240 256 A 28 28 0 0 1 272 256"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
    fill="none"
  />
  <path
    d="M 272 256 A 28 28 0 0 1 240 256"
    stroke="white"
    stroke-width="8"
    stroke-linecap="round"
    fill="none"
    stroke-dasharray="2 20"
  />
  <!-- Arrow heads -->
  <polygon points="274,248 280,256 272,262" fill="white" />
  <polygon points="238,264 232,256 240,250" fill="white" />
</svg>
